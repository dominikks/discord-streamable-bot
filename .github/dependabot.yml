version: 2
updates:
  # Update Rust dependencies monthly
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # Patch updates are low-risk and can be reviewed together
      cargo-patch:
        update-types:
          - "patch"
      # Minor and major updates may be breaking and are grouped separately
      cargo-minor-major:
        update-types:
          - "minor"
          - "major"

  # Update GitHub Actions monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      # Patch updates are low-risk and can be reviewed together
      actions-patch:
        update-types:
          - "patch"
      # Minor and major updates may be breaking and are grouped separately
      actions-minor-major:
        update-types:
          - "minor"
          - "major"
